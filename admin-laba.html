<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />

  <title>Edit Laba</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin-laba.css">

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<main class="phone-shell">
<section class="app-screen">

  <!-- =========================
       MAIN CONTENT
  ========================= -->
  <section class="admin-laba-main">

    <!-- HEADER -->
    <div class="admin-laba-page">

      <div class="topbar">

        <h2 class="topbar-title">
          Edit Laba
        </h2>

        <!-- FILTER TANGGAL -->
        <div class="filter-wrapper">

          <button
            id="filterBtn"
            class="filter-btn"
            type="button"
          >

            <img
              src="assets/icons/icon-filter.svg"
              alt="filter"
            >

          </button>

          <input
            type="date"
            id="filterTanggal"
            class="date-overlay"
          >

        </div>

      </div>

    </div>

    <!-- =========================
         SHOPEEFOOD
    ========================= -->
    <div class="input-group">

      <label class="input-label">
        ShopeeFood
      </label>

      <div class="input-wrapper">

        <span class="currency">Rp</span>

        <input
          type="text"
          id="shopeeInput"
          placeholder="Contoh: 120.000"
          inputmode="numeric"
          autocomplete="off"
          enterkeyhint="next"
        />

      </div>

    </div>

    <!-- =========================
         GRABFOOD
    ========================= -->
    <div class="input-group">

      <label class="input-label">
        GrabFood
      </label>

      <div class="input-wrapper">

        <span class="currency">Rp</span>

        <input
          type="text"
          id="grabInput"
          placeholder="Contoh: 80.000"
          inputmode="numeric"
          autocomplete="off"
          enterkeyhint="next"
        />

      </div>

    </div>

    <!-- =========================
         GOFOOD
    ========================= -->
    <div class="input-group">

      <label class="input-label">
        GoFood
      </label>

      <div class="input-wrapper">

        <span class="currency">Rp</span>

        <input
          type="text"
          id="gofoodInput"
          placeholder="Contoh: 100.000"
          inputmode="numeric"
          autocomplete="off"
          enterkeyhint="next"
        />

      </div>

    </div>

    <!-- =========================
         QRIS
    ========================= -->
    <div class="input-group">

      <label class="input-label">
        QRIS
      </label>

      <div class="input-wrapper">

        <span class="currency">Rp</span>

        <input
          type="text"
          id="qrisInput"
          placeholder="Contoh: 150.000"
          inputmode="numeric"
          autocomplete="off"
          enterkeyhint="next"
        />

      </div>

    </div>

    <!-- =========================
         CASH
    ========================= -->
    <div class="input-group">

      <label class="input-label">
        Cash
      </label>

      <div class="input-wrapper">

        <span class="currency">Rp</span>

        <input
          type="text"
          id="cashInput"
          placeholder="Contoh: 200.000"
          inputmode="numeric"
          autocomplete="off"
          enterkeyhint="done"
        />

      </div>

    </div>

    <!-- =========================
         TOTAL
    ========================= -->
    <div class="total-card">

      <span class="total-label">
        Total Penjualan
      </span>

      <strong
        id="totalPenjualan"
        class="total-value"
      >

        Rp 0

      </strong>

    </div>

    <!-- BUTTON -->
    <button
      id="saveLabaBtn"
      class="primary-btn"
      type="button"
    >

      Simpan Laporan

    </button>

  </section>

</section>
</main>

<!-- JS -->
<script
  type="module"
  src="js/admin-laba.js">
</script>

</body>
</html>
