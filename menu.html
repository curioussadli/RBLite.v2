<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

  <title>Menu POS</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/menu.css">

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    .menu-section-title {
      margin: 16px 0 8px;
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
  </style>
</head>

<body>

  <main class="phone-shell">
    <section class="app-screen">

      <!-- ================= MENU ================= -->
      <section class="menu-main">

        <!-- TOPBAR -->
        <div class="menu-page">
          <div class="topbar">

            <h2 class="topbar-title">Menu</h2>

          </div>
        </div>

        <!-- ================= MAKANAN ================= -->
        <div class="menu-section">
          <h3 class="menu-section-title">Makanan</h3>
          <div id="foodList" class="menu-grid"></div>
        </div>

        <!-- ================= MINUMAN ================= -->
        <div class="menu-section">
          <h3 class="menu-section-title">Minuman</h3>
          <div id="drinkList" class="menu-grid"></div>
        </div>

      </section>

      <!-- ================= CART ================= -->
      <section class="cart-wrapper">
        <div id="cartBottomBar" class="cart-bottom-bar">
          <span id="cartCount">0 item</span>
          <span id="cartBottomTotal">Rp 0</span>
        </div>
      </section>

      <!-- ================= BOTTOM NAV ================= -->
      <nav class="bottom-nav">

        <a href="dashboard.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-saldo.svg">
          </div>
          <span>Saldo</span>
        </a>

        <a href="stok.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-stok.svg">
          </div>
          <span>Stok</span>
        </a>

        <a href="menu.html" class="nav-item active">
          <div class="nav-icon">
            <img src="assets/icons/icon-menu.svg">
          </div>
          <span>Menu</span>
        </a>

        <a href="riwayat-pesanan.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-pesanan.svg">
          </div>
          <span>Riwayat</span>
        </a>

        <!-- 🔥 INI YANG DIUBAH -->
        <a href="laporan.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-laporan.svg">
          </div>
          <span>Laporan</span>
        </a>

      </nav>

    </section>
  </main>

  <!-- SCRIPT -->
  <script type="module" src="js/menu.js"></script>

</body>
</html>
