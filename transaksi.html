<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Transaksi</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/transaksi.css">

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <main class="phone-shell">
    <section class="app-screen">

      <!-- =========================
           MAIN CONTENT
      ========================= -->
      <section class="transaksi-main">

        <!-- =========================
             HEADER
        ========================= -->
        <div class="transaksi-page">

          <!-- TOPBAR -->
          <div class="topbar">
            <h2 class="topbar-title">Transaksi</h2>
          </div>

          <!-- FILTER -->
          <div class="filter-wrapper">
            <button id="filterBtn" class="filter-btn">
              <img src="assets/icons/icon-filter.svg" alt="filter">
            </button>

            <input type="date" id="filterTanggal" class="date-overlay">
          </div>

        </div>

        <!-- =========================
             INPUT NOMINAL
        ========================= -->
        <div class="input-group">
          <label class="input-label">Nominal (Rp)</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="saldoAwalInput"
              placeholder="Contoh: 20.000"
              inputmode="numeric"
            />
          </div>
        </div>

        <!-- =========================
             INPUT KETERANGAN
        ========================= -->
        <div class="input-group">
          <label class="input-label">Keterangan</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="keteranganInput" 
              placeholder="Contoh: Uang Makan"
            />
          </div>
        </div>

        <!-- =========================
             BUTTON
        ========================= -->
        <button id="saveSaldoBtn" class="primary-btn">
          Simpan
        </button>

        <!-- =========================
             LIST TRANSAKSI
        ========================= -->
        <div class="rincian-wrapper">
          <div id="transaksiKeluar" class="rincian-list"></div>
        </div>

      </section>

    </section>
  </main>

  <!-- JS -->
  <script type="module" src="js/transaksi.js"></script>

</body>
</html>
